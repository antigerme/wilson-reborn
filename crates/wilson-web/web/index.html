<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-3.0-or-later -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wilson Reborn — web</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1rem;
    background: #0b0f17; color: #cdd6f4;
    font: 15px/1.5 system-ui, sans-serif;
  }
  h1 { margin: .2rem; font-size: 1.1rem; font-weight: 600; }
  #screen {
    image-rendering: pixelated;            /* crisp 1992 pixels when scaled up */
    width: min(96vw, 128vh);               /* keep the 4:3 aspect, fit the viewport */
    aspect-ratio: 4 / 3; background: #000;
    border: 1px solid #1e2536; border-radius: 6px;
  }
  #panel { display: flex; flex-wrap: wrap; gap: .75rem 1.25rem; align-items: center; max-width: 96vw; }
  label { display: inline-flex; gap: .4rem; align-items: center; }
  #status { min-height: 1.2em; color: #f9e2af; }
  a { color: #89b4fa; }
  .hint { opacity: .7; font-size: .85em; max-width: 60ch; text-align: center; }
</style>
</head>
<body>
  <h1>Wilson Reborn — the life of Johnny Castaway, in your browser</h1>

  <canvas id="screen" width="640" height="480"></canvas>

  <div id="panel">
    <label>RESOURCE.MAP <input id="map" type="file" /></label>
    <label>RESOURCE.001 <input id="data" type="file" /></label>
    <label title="The original's dormant tiled dissolve, resurrected">
      <input id="dissolve" type="checkbox" /> dissolve transitions
    </label>
    <button id="start" disabled>Start</button>
  </div>

  <div id="status"></div>
  <p class="hint">
    The game data is copyright Sierra/Dynamix and is <strong>not</strong> bundled — pick your
    own <code>RESOURCE.MAP</code> and <code>RESOURCE.001</code> (e.g. from the Internet
    Archive's <code>scrantic-run.zip</code>). Everything runs locally; nothing is uploaded.
  </p>

<script type="module">
  import init, { Wilson, has_embedded_data } from "./wilson_web.js";

  const $ = (id) => document.getElementById(id);
  const status = (m) => { $("status").textContent = m; };
  const seed = () => Math.random() * 9007199254740991;
  let running = null;

  // Drive a built Wilson into the canvas on a timer (shared by both flows).
  function run(wilson) {
    if (running) { clearTimeout(running); running = null; }
    if ($("dissolve").checked) wilson.enable_dissolve();
    const canvas = $("screen");
    canvas.width = wilson.width();
    canvas.height = wilson.height();
    const ctx = canvas.getContext("2d");
    const tick = () => {
      const rgba = wilson.frame(Date.now() / 1000);
      ctx.putImageData(new ImageData(new Uint8ClampedArray(rgba), wilson.width(), wilson.height()), 0, 0);
      running = setTimeout(tick, wilson.delay_ms());
    };
    tick();
  }

  await init(); // load the wasm module

  if (has_embedded_data()) {
    // Self-contained build: the data is baked into the wasm — no file picker, just run.
    $("panel").hidden = true;
    try {
      run(Wilson.embedded(seed(), Date.now() / 1000));
      status("Running (embedded data).");
    } catch (err) {
      status("Could not start: " + err);
    }
  } else {
    // Bring-your-own: read RESOURCE.MAP + RESOURCE.001 from the file pickers.
    let mapBytes = null, dataBytes = null;
    const readFile = (input) => new Promise((resolve) => {
      const f = input.files && input.files[0];
      if (!f) return resolve(null);
      const r = new FileReader();
      r.onload = () => resolve(new Uint8Array(r.result));
      r.readAsArrayBuffer(f);
    });
    const refresh = () => { $("start").disabled = !(mapBytes && dataBytes); };
    $("map").addEventListener("change", async (e) => { mapBytes = await readFile(e.target); refresh(); });
    $("data").addEventListener("change", async (e) => { dataBytes = await readFile(e.target); refresh(); });
    $("start").addEventListener("click", () => {
      try {
        run(new Wilson(mapBytes, dataBytes, seed(), Date.now() / 1000));
        status("Running. (Reload to pick different data.)");
      } catch (err) {
        status("Could not start: " + err);
      }
    });
  }
</script>
</body>
</html>
