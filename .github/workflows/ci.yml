name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --verbose

      - name: Test
        run: cargo test --workspace --all-features --verbose

  # GitHub does not provide a "fedora-latest" runner, so we run the same checks
  # inside an official Fedora container on an Ubuntu host. The toolchain is
  # installed via rustup so it matches the `stable` used by the other jobs.
  test-fedora:
    name: Build & Test (fedora-latest)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install system dependencies
        # gcc/git for the toolchain; the rest are link-time deps the GUI app may
        # need on Linux (winit/softbuffer dlopen most of these, but be safe).
        run: dnf -y install gcc git wayland-devel libxkbcommon-devel libX11-devel

      - uses: actions/checkout@v4

      - name: Install Rust toolchain (rustup)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          . "$HOME/.cargo/env"
          rustup component add clippy rustfmt
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --verbose

      - name: Test
        run: cargo test --workspace --all-features --verbose
