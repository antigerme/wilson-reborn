name: Release

# Build distributable binaries: the Windows screensaver (`wilson.scr`), a Linux binary
# and a macOS binary. Runs on a version tag (`v*`) — attaching the files to a GitHub
# Release with auto-generated notes (`generate_release_notes`) — and can be triggered
# manually (`workflow_dispatch`) to download the artifacts for testing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create/update the GitHub Release on a tag

env:
  CARGO_TERM_COLOR: always
  # Node 20 is deprecated (GitHub forces Node 24 from 2026-06-16). Opt every JS action
  # (upload-artifact, action-gh-release, rust-cache, …) into Node 24 to drop the warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows screensaver (.scr)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p wilson

      - name: Package screensaver
        # A Windows screensaver is just the executable with a .scr extension.
        shell: bash
        run: cp target/release/wilson.exe wilson.scr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-windows
          path: |
            wilson.scr
            target/release/wilson.exe

      - name: Attach to release
        # Only the linux job generates the release notes (see below). If both parallel
        # jobs set `generate_release_notes`, action-gh-release appends the changelog
        # twice. This job just adds its files to the (shared, tag-keyed) release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wilson.scr
            target/release/wilson.exe

  linux:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p wilson

      - name: Package binary
        run: tar -czf wilson-linux-x86_64.tar.gz -C target/release wilson

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-linux
          path: wilson-linux-x86_64.tar.gz

      - name: Attach to release
        # Single source of the auto-generated release notes — the other jobs must NOT
        # also set `generate_release_notes`, or the changelog gets duplicated.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: wilson-linux-x86_64.tar.gz

  macos:
    name: macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p wilson

      - name: Package binary
        # macos-latest is Apple Silicon, so this is an arm64 binary.
        run: tar -czf wilson-macos-arm64.tar.gz -C target/release wilson

      - name: Build .saver bundle
        run: bash crates/wilson-saver/macos/build-saver.sh

      - name: Package .saver
        # `ditto` preserves the bundle structure inside the zip.
        run: ditto -c -k --keepParent target/saver/WilsonReborn.saver WilsonReborn.saver.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-macos
          path: |
            wilson-macos-arm64.tar.gz
            WilsonReborn.saver.zip

      - name: Attach to release
        # No `generate_release_notes` here — the linux job is the sole notes generator.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wilson-macos-arm64.tar.gz
            WilsonReborn.saver.zip

  web:
    name: Web bundle (WASM, bring-your-own)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (+ wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli (version matching the wasm-bindgen crate)
        run: |
          ver=$(awk '/^name = "wasm-bindgen"$/{f=1} f && /^version = /{gsub(/[",]/,"",$3); print $3; exit}' Cargo.lock)
          echo "installing wasm-bindgen-cli $ver"
          cargo install wasm-bindgen-cli --version "$ver" --locked

      - name: Build the bring-your-own web bundle
        # No WILSON_EMBED_DATA ⇒ no game data is baked in (copyright-safe to distribute). The
        # page asks the user for their own original data files (loose or a .zip), read locally.
        run: bash crates/wilson-web/build-web.sh

      - name: Package web bundle
        run: |
          cat > crates/wilson-web/web/HOW-TO-RUN.txt <<'TXT'
          Wilson Reborn — Web/WASM (bring your own data)

          1. Serve this folder over HTTP (ES modules + wasm need http, not file://), e.g.:
               python3 -m http.server 8000
          2. Open http://localhost:8000/ and drop your own original Johnny Castaway data files
             (the .MAP + .001; add SCRANTIC.EXE for sound), or a scrantic-run / installer .zip.
          Everything runs locally in your browser; nothing is uploaded. No game data is
          bundled here (it is copyright). URL options & details: crates/wilson-web/README.md.
          TXT
          zip -j wilson-web.zip \
            crates/wilson-web/web/index.html \
            crates/wilson-web/web/wilson_web.js \
            crates/wilson-web/web/wilson_web_bg.wasm \
            crates/wilson-web/web/HOW-TO-RUN.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-web
          path: wilson-web.zip

      - name: Attach to release
        # No `generate_release_notes` here — the linux job is the sole notes generator.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wilson-web.zip

  checksums:
    name: Checksums (SHA-256)
    # Runs after every artifact-producing job so it can hash them all into one file. Lets users
    # verify their downloads (the Windows binaries are unsigned for now — see docs/INSTALL.md).
    needs: [windows, linux, macos, web]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256SUMS.txt
        # One line per distributable file, using basenames so `sha256sum -c SHA256SUMS.txt`
        # works when run next to the downloaded files (the filenames are unique across jobs).
        run: |
          find artifacts -type f \( -name 'wilson.scr' -o -name 'wilson.exe' -o -name '*.tar.gz' -o -name '*.zip' \) \
            | sort | while read -r f; do ( cd "$(dirname "$f")" && sha256sum "$(basename "$f")" ); done > SHA256SUMS.txt
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS.txt

      - name: Attach to release
        # No `generate_release_notes` here — the linux job is the sole notes generator.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
