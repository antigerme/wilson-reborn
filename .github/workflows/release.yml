name: Release

# Build distributable binaries: the Windows screensaver (`wilson.scr`) and a Linux
# binary. Runs on a version tag (`v*`) — attaching the files to a GitHub Release with
# auto-generated notes (`generate_release_notes`) — and can be triggered manually
# (`workflow_dispatch`) to download the artifacts for testing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create/update the GitHub Release on a tag

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows screensaver (.scr)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p wilson

      - name: Package screensaver
        # A Windows screensaver is just the executable with a .scr extension.
        shell: bash
        run: cp target/release/wilson.exe wilson.scr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-windows
          path: |
            wilson.scr
            target/release/wilson.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wilson.scr
            target/release/wilson.exe

  linux:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p wilson

      - name: Package binary
        run: tar -czf wilson-linux-x86_64.tar.gz -C target/release wilson

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wilson-linux
          path: wilson-linux-x86_64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: wilson-linux-x86_64.tar.gz
